  <rect x="1000" y="478" width="468" height="32" rx="8" class="surface2"/>
  <text x="1016" y="499" class="muted" font-size="13">Memory</text>
  <text x="1100" y="499" class="text" font-size="13" font-weight="500">待确认 7 · 自动学习已限制到 user turn</text>

  <rect x="1000" y="522" width="468" height="2" rx="1" fill="#23252a"/>
  <text x="1000" y="560" class="muted" font-size="12">最近事件</text>
  <circle cx="1016" cy="592" r="4" fill="#5e6ad2"/>
  <text x="1030" y="596" class="text" font-size="13">打开 Claude 中文窗口</text>
  <text x="1398" y="596" text-anchor="end" class="subtle" font-size="12">刚刚</text>
  <circle cx="1016" cy="628" r="4" fill="#8ce0a6"/>
  <text x="1030" y="632" class="text" font-size="13">记忆辅助状态刷新</text>
  <text x="1398" y="632" text-anchor="end" class="subtle" font-size="12">2m</text>
  <circle cx="1016" cy="664" r="4" fill="#f4c46f"/>
  <text x="1030" y="668" class="text" font-size="13">插件中心列表加载</text>
  <text x="1398" y="668" text-anchor="end" class="subtle" font-size="12">5m</text>

