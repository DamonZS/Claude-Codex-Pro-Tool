  <text x="840" y="182" class="text" font-size="28" font-weight="700">124</text>
  <text x="894" y="183" class="muted" font-size="13">条长期记忆</text>
  <text x="840" y="208" class="muted" font-size="13">7 条待确认 / 2 个工作区</text>
  <rect x="1032" y="138" width="88" height="24" rx="12" class="greenPill"/>
  <text x="1076" y="155" text-anchor="middle" class="greenText">已注入</text>

  <!-- Stat card 4 -->
  <text x="1192" y="148" class="label" font-size="12" font-weight="600">插件中心</text>
  <text x="1192" y="182" class="text" font-size="28" font-weight="700">36</text>
  <text x="1238" y="183" class="muted" font-size="13">个可浏览资源</text>
