  <text x="1418" y="803" text-anchor="end" class="subtle" font-size="12">待确认</text>

  <rect x="1000" y="828" width="228" height="42" rx="8" class="btn"/>
  <text x="1114" y="854" text-anchor="middle" class="btnText" font-size="13">记住当前内容</text>
  <rect x="1240" y="828" width="228" height="42" rx="8" class="btn"/>
  <text x="1354" y="854" text-anchor="middle" class="btnText" font-size="13">导入 / 导出</text>

  <!-- Bottom rail note -->
  <rect x="116" y="922" width="1388" height="40" rx="8" fill="#0b0c0d" stroke="#23252a"/>
  <text x="136" y="947" class="muted" font-size="12">这版样图的目标：更像 Linear 风格的专业控制台，减少“原版应用感”，把 Codex / Claude / 插件 / 记忆统一进同一个密度层级。</text>
  <rect x="1424" y="932" width="60" height="20" rx="10" class="greenPill"/>
  <text x="1454" y="946" text-anchor="middle" class="greenText" font-size="11">Ready</text>
