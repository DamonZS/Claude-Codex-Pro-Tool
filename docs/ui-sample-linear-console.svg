  <text x="835" y="409" text-anchor="middle" class="btnText" font-size="13">记忆搜索 / 学习</text>

  <line x1="138" y1="454" x2="920" y2="454" class="rowLine"/>
  <g>
    <circle cx="150" cy="486" r="6" fill="#5e6ad2"/>
    <text x="168" y="490" class="text" font-size="14" font-weight="600">Codex / Claude / 插件 / 记忆都在同一窗口内操作</text>
    <text x="168" y="512" class="muted" font-size="13">减少“像原版应用”的既视感，用统一控制台语言承载所有功能。</text>
  </g>

  <!-- Diagnostics panel -->
  <text x="1000" y="296" class="label" font-size="12" font-weight="600">实时诊断</text>
  <text x="1000" y="330" class="text" font-size="22" font-weight="700">后端与窗口状态</text>
  <rect x="1000" y="350" width="468" height="40" rx="8" class="surface2"/>
  <text x="1016" y="375" class="muted" font-size="13">后端端口</text>
  <text x="1110" y="375" class="mono" font-size="13">127.0.0.1:57321</text>
  <rect x="1356" y="358" width="96" height="24" rx="12" class="greenPill"/>
  <text x="1404" y="375" text-anchor="middle" class="greenText">连接正常</text>

  <rect x="1000" y="402" width="468" height="32" rx="8" class="surface2"/>
