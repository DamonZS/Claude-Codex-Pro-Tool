  <text x="138" y="330" class="text" font-size="22" font-weight="700">把启动、诊断、翻译、插件集中在同一层级</text>
  <text x="138" y="354" class="muted" font-size="13">面向高频运维：少跳转、少弹窗、少视觉噪音。</text>

