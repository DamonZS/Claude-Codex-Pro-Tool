  <text x="158" y="692" class="text" font-size="15" font-weight="600">官方 Claude 插件市场</text>
  <text x="158" y="712" class="muted" font-size="12">已连接 · 14 个官方条目</text>
  <rect x="774" y="682" width="136" height="28" rx="14" class="primary"/>
  <text x="842" y="701" text-anchor="middle" class="primaryText" font-size="12">查看 / 安装</text>

  <rect x="138" y="734" width="790" height="56" rx="8" class="surface2"/>
  <text x="158" y="756" class="text" font-size="15" font-weight="600">GitHub MCP Registry</text>
  <text x="158" y="776" class="muted" font-size="12">元数据已同步 · 6 个需审查的包</text>
  <rect x="774" y="746" width="136" height="28" rx="14" class="btn"/>
  <text x="842" y="765" text-anchor="middle" class="btnText" font-size="12">预览配置</text>

  <rect x="138" y="798" width="790" height="56" rx="8" class="surface2"/>
  <text x="158" y="820" class="text" font-size="15" font-weight="600">Prompt Optimizer / Skills</text>
  <text x="158" y="840" class="muted" font-size="12">识别到 SKILL.md 结构 · 可安装 / 可审查</text>
  <rect x="774" y="810" width="136" height="28" rx="14" class="btn"/>
  <text x="842" y="829" text-anchor="middle" class="btnText" font-size="12">打开来源</text>

  <!-- Memory panel -->
  <text x="1000" y="580" class="label" font-size="12" font-weight="600">记忆辅助</text>
  <text x="1000" y="614" class="text" font-size="22" font-weight="700">项目记忆 + 全局记忆</text>
  <text x="1000" y="638" class="muted" font-size="13">手动学习、待确认候选、检索注入、导入导出。</text>

  <rect x="1000" y="670" width="468" height="42" rx="8" class="surface2"/>
  <text x="1016" y="696" class="muted" font-size="13">搜索记忆</text>
  <text x="1100" y="696" class="subtle" font-size="13">输入关键词 / 项目约定 / 修复结论</text>

  <rect x="1000" y="724" width="468" height="44" rx="8" class="surface2"/>
  <circle cx="1020" cy="746" r="5" fill="#5e6ad2"/>
  <text x="1034" y="751" class="text" font-size="13">Codex 相关项目约定</text>
  <text x="1418" y="751" text-anchor="end" class="subtle" font-size="12">已学习</text>

  <rect x="1000" y="776" width="468" height="44" rx="8" class="surface2"/>
  <circle cx="1020" cy="798" r="5" fill="#f4c46f"/>
