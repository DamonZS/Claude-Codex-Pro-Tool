  <text x="138" y="614" class="text" font-size="22" font-weight="700">官方、MCP、Skills、社区资源分层呈现</text>
  <text x="138" y="638" class="muted" font-size="13">列表只展示元数据，安装前先看预览和风险标记。</text>

