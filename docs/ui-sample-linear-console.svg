  <text x="128" y="62" class="muted" font-size="13">Linear 深色控制台 / 运维、插件、记忆、Claude 联动</text>

  <rect x="620" y="22" width="236" height="34" rx="17" class="pill"/>
  <circle cx="640" cy="39" r="5" fill="#5e6ad2"/>
  <text x="654" y="44" class="pillText" font-size="12">后端链接 · 127.0.0.1:57321</text>

  <rect x="1138" y="22" width="92" height="34" rx="8" class="btn"/>
  <text x="1184" y="44" text-anchor="middle" class="btnText" font-size="13">启动 Claude</text>

  <rect x="1238" y="22" width="112" height="34" rx="8" class="primary"/>
  <text x="1294" y="44" text-anchor="middle" class="primaryText" font-size="13">打开中文窗口</text>

  <rect x="1358" y="22" width="92" height="34" rx="8" class="btn"/>
  <text x="1404" y="44" text-anchor="middle" class="btnText" font-size="13">重启 Codex</text>

  <rect x="1458" y="22" width="112" height="34" rx="8" class="btn"/>
  <text x="1514" y="44" text-anchor="middle" class="btnText" font-size="13">插件中心</text>

  <!-- Content grid -->
  <g filter="url(#shadow)">
    <rect x="116" y="116" width="336" height="128" rx="10" class="surface"/>
    <rect x="468" y="116" width="336" height="128" rx="10" class="surface"/>
    <rect x="820" y="116" width="336" height="128" rx="10" class="surface"/>
    <rect x="1172" y="116" width="336" height="128" rx="10" class="surface"/>

    <rect x="116" y="264" width="842" height="262" rx="10" class="surface"/>
    <rect x="978" y="264" width="530" height="262" rx="10" class="surface"/>

    <rect x="116" y="548" width="842" height="340" rx="10" class="surface"/>
    <rect x="978" y="548" width="530" height="340" rx="10" class="surface"/>
  </g>

  <!-- Stat card 1 -->
  <text x="136" y="148" class="label" font-size="12" font-weight="600">CODEx 运行状态</text>
  <text x="136" y="182" class="text" font-size="28" font-weight="700">在线</text>
  <text x="136" y="208" class="muted" font-size="13">4/4 关键命令已响应</text>
  <path d="M355 195 L372 183 L389 188 L406 170 L423 176 L440 162" fill="none" stroke="#5e6ad2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="340" y="138" width="76" height="24" rx="12" class="greenPill"/>
  <text x="378" y="155" text-anchor="middle" class="greenText">稳定</text>

  <!-- Stat card 2 -->
  <text x="488" y="148" class="label" font-size="12" font-weight="600">CLAUDE 桌面端</text>
  <text x="488" y="182" class="text" font-size="28" font-weight="700">可启动</text>
  <text x="488" y="208" class="muted" font-size="13">独立包装窗口 / 无阻断提示</text>
  <rect x="692" y="138" width="88" height="24" rx="12" class="pill"/>
  <text x="736" y="155" text-anchor="middle" class="pillText">MSIX 诊断</text>
