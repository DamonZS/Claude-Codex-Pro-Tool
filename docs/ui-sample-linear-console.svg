<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34343a"/>
      <stop offset="1" stop-color="#23252a"/>
    </linearGradient>
    <style>
      .bg { fill: #010102; }
      .surface { fill: #0f1011; stroke: #23252a; stroke-width: 1; }
      .surface2 { fill: #141516; stroke: #2a2c31; stroke-width: 1; }
      .surface3 { fill: #18191a; stroke: #2e3036; stroke-width: 1; }
      .text { fill: #f7f8f8; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; }
      .muted { fill: #8a8f98; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; }
      .subtle { fill: #62666d; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; }
      .label { fill: #d0d6e0; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; letter-spacing: 0.4px; }
      .mono { fill: #d7dbe2; font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
      .btn { fill: #141516; stroke: #2b2d32; stroke-width: 1; }
      .btnText { fill: #f7f8f8; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; font-size: 13px; font-weight: 500; }
      .primary { fill: #5e6ad2; }
      .primaryText { fill: #ffffff; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; font-size: 13px; font-weight: 600; }
      .pill { fill: #141516; stroke: #32343a; stroke-width: 1; }
      .pillText { fill: #d0d6e0; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .greenPill { fill: #11261a; stroke: #1f5133; stroke-width: 1; }
      .greenText { fill: #8ce0a6; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; font-size: 12px; font-weight: 600; }
      .amberPill { fill: #261d10; stroke: #5a4318; stroke-width: 1; }
      .amberText { fill: #f4c46f; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; font-size: 12px; font-weight: 600; }
      .rowLine { stroke: #23252a; stroke-width: 1; }
      .chip { fill: #18191a; stroke: #2a2c31; stroke-width: 1; }
      .chipText { fill: #c8ced9; font-family: Inter, SF Pro Display, Segoe UI, system-ui, sans-serif; font-size: 11px; font-weight: 500; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>

  <!-- Left rail -->
  <rect x="0" y="0" width="92" height="1000" fill="#0b0c0d" stroke="#1f2126" stroke-width="1"/>
  <rect x="18" y="20" width="56" height="56" rx="14" fill="#141516" stroke="#2b2d32"/>
  <text x="46" y="57" text-anchor="middle" class="text" font-size="22" font-weight="700">C</text>
  <rect x="26" y="108" width="40" height="40" rx="12" fill="#5e6ad2"/>
  <circle cx="46" cy="128" r="8" fill="#ffffff"/>
  <rect x="26" y="160" width="40" height="40" rx="12" class="surface2"/>
  <rect x="26" y="212" width="40" height="40" rx="12" class="surface2"/>
  <rect x="26" y="264" width="40" height="40" rx="12" class="surface2"/>
  <rect x="26" y="316" width="40" height="40" rx="12" class="surface2"/>
  <rect x="26" y="368" width="40" height="40" rx="12" class="surface2"/>
  <rect x="26" y="920" width="40" height="40" rx="12" class="surface2"/>
  <circle cx="46" cy="940" r="8" fill="#8a8f98"/>

