name: Release assets
# manual-release-assets-9: windows-x64-setup.exe, windows-x64.zip, macos-x64.dmg, macos-x64.zip, macos-arm64.dmg, macos-arm64.zip, latest.json, Source code (zip), Source code (tar.gz)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows-installer:
    if: ${{ !contains(github.event.release.body, 'auto-release-installers-managed') }}
    runs-on: windows-latest
    env:
      CLAUDE_CODEX_PRO_RELEASE_VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        working-directory: apps/claude-codex-pro-manager
        run: npm install --package-lock=false

      - name: TypeScript check
        working-directory: apps/claude-codex-pro-manager
        run: npm run check

      - name: Build frontend
        working-directory: apps/claude-codex-pro-manager
        run: npm run vite:build

      - name: Rust tests
        shell: pwsh
        run: |
          cargo test --workspace *>&1 | Tee-Object cargo-test.log
          if ($LASTEXITCODE -ne 0) {
            $tail = (Get-Content cargo-test.log -Tail 80) -join "`n"
            $escaped = $tail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Windows Rust tests failed::$escaped"
            exit $LASTEXITCODE
          }

      - name: Build binaries
        run: cargo build --release

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/claude-codex-pro.exe dist/windows/app/
          Copy-Item target/release/claude-codex-pro-manager.exe dist/windows/app/

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart("v", "V")
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" ClaudeCodexPro.nsi
          Pop-Location

      - name: Package Windows ZIP
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart("v", "V")
          $zip = "dist/windows/claude-codex-pro-$version-windows-x64.zip"
          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }
          Compress-Archive -Path dist/windows/app/* -DestinationPath $zip -Force

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/windows/*windows-x64-setup.exe
            dist/windows/*windows-x64.zip

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    if: ${{ !contains(github.event.release.body, 'auto-release-installers-managed') }}
    runs-on: ${{ matrix.runner }}
    env:
      CLAUDE_CODEX_PRO_RELEASE_VERSION: ${{ github.event.release.tag_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-latest
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: apps/claude-codex-pro-manager
        run: npm install --package-lock=false

      - name: TypeScript check
        working-directory: apps/claude-codex-pro-manager
        run: npm run check

      - name: Build frontend
        working-directory: apps/claude-codex-pro-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build macOS DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#V}"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          for app in "dist/macos/stage/Claude Codex Pro.app" "dist/macos/stage/Claude Codex Pro Manager.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign -dv "$app" >/dev/null 2>&1
            echo "verified: $app"
          done

      - name: Package macOS ZIP
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          version="${version#V}"
          zip_path="dist/macos/claude-codex-pro-${version}-macos-${{ matrix.arch }}.zip"
          zip_stage="dist/macos/zip-stage"
          rm -rf "$zip_stage" "$zip_path"
          mkdir -p "$zip_stage"
          cp -R "dist/macos/stage/Claude Codex Pro.app" "$zip_stage/"
          cp -R "dist/macos/stage/Claude Codex Pro Manager.app" "$zip_stage/"
          ln -s /Applications "$zip_stage/Applications"
          ditto -c -k --sequesterRsrc "$zip_stage" "$zip_path"

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/macos/*macos-${{ matrix.arch }}.dmg
            dist/macos/*macos-${{ matrix.arch }}.zip

  latest-json:
    name: Upload static latest.json
    if: ${{ !contains(github.event.release.body, 'auto-release-installers-managed') }}
    runs-on: ubuntu-latest
    needs:
      - windows-installer
      - macos-dmg
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = release.tagName || process.env.TAG;
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const assets = (release.assets || [])
            .map((asset) => asset.name)
            .filter((name) => name !== "latest.json")
            .map((name) => ({ name, url: `${baseUrl}/${encodeURIComponent(name)}` }));
          const payload = {
            version: tag,
            url: release.url || `https://github.com/${repo}/releases/tag/${tag}`,
            body: release.body || "",
            assets
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
